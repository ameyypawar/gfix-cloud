# docker-compose.yml
#
# Phase 2: real db service added.
# Phase 6 will wire up the api + web services + seed.
#
# Quick start (db only):
#   docker compose up -d db
#
# Then run the API locally:
#   cd api && DATABASE_URL=postgresql://postgres:postgres@localhost:5432/gfixcloud \
#            uvicorn app.main:app --port 8080

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gfixcloud
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "gfixcloud"]
      interval: 5s
      timeout: 5s
      retries: 12

  # api and web stubs — see Phase 6 for Dockerfiles
  # api:
  #   build: ./api
  #   ...
  # web:
  #   build: ./web
  #   ...
